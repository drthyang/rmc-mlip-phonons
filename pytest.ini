[pytest]
testpaths = tests
addopts = -ra --strict-markers
markers =
    slow: end-to-end pipeline runs (MLIP relax + phonopy); deselect with -m "not slow"
filterwarnings =
    # spglib >=2.6 announces a future change to its error-handling default.
    ignore:Set OLD_ERROR_HANDLING to false
    # phonopy >=4 notes that primitive_matrix='auto' resolves to a non-identity
    # matrix (v3 default was identity) — exactly the fcc primitive we want.
    ignore:primitive_matrix defaulted to
